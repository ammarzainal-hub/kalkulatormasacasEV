<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Mengecas EV</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cas EV">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Kalkulator Mengecas EV</h1>
        <p class="subtitle">Kapasiti Bateri: 44.9 kWh</p>
        
        <div class="input-group">
            <label for="currentCharge">Paras Cas Semasa: <span id="chargeValue">50</span>%</label>
            <input type="range" id="currentCharge" min="0" max="89" value="50" class="slider">
            <div class="range-labels">
                <span>0%</span>
                <span>89%</span>
            </div>
        </div>
        
        <div class="input-group">
            <label for="chargerPower">Kuasa Pengecas</label>
            <select id="chargerPower">
                <option value="8" data-kw="1.6">8A (Slow Charger)</option>
                <option value="16" data-kw="3.2">16A (Standard)</option>
                <option value="32" data-kw="6.3" selected>32A (Fast Charger)</option>
            </select>
        </div>
        
        <div class="target-info">
            <p>🎯 Tahap Cas Sasaran: <strong>90%</strong></p>
        </div>
        
        <div class="input-group time-group">
            <label class="toggle-label">
                <input type="checkbox" id="manualToggle">
                <span>Set waktu mula manual</span>
            </label>
            <input type="time" id="startTime" class="time-input" disabled>
        </div>
        
        <div id="result" class="result"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
