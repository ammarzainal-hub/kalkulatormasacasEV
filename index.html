<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Mengecas EV</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⚡ Kalkulator Mengecas EV</h1>
        <p class="subtitle">Kapasiti Bateri: 44.9 kWh</p>
        
        <div class="input-group">
            <label for="currentCharge">Paras Cas Semasa: <span id="chargeValue">50</span>%</label>
            <input type="range" id="currentCharge" min="0" max="89" value="50" class="slider">
            <div class="range-labels">
                <span>0%</span>
                <span>89%</span>
            </div>
        </div>
        
        <div class="input-group">
            <label for="chargerPower">Kuasa Pengecas</label>
            <select id="chargerPower">
                <option value="1.6">1.6 kW (Slow Charger)</option>
                <option value="3.2">3.2 kW (Standard)</option>
                <option value="6.3" selected>6.3 kW (Fast Charger)</option>
            </select>
        </div>
        
        <div class="target-info">
            <p>🎯 Tahap Cas Sasaran: <strong>90%</strong></p>
        </div>
        
        <div id="result" class="result"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
